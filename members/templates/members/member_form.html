{% extends 'members/base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Player Form</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="player_name" value="{{ player.player_name }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="player_age" value="{{ player.player_age }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Number</label>
                <input type="number" name="player_number" value="{{ player.player_number }}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'player_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
